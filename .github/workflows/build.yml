name: Build, Test, Analyze & Release CodeLens AI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_PATH: CodeLensAI.sln
  PROJECT_PATH: CodeLensAI/CodeLensAI.csproj
  VSIX_OUTPUT_DIR: CodeLensAI/bin/Release
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  build:
    name: Build, Test & Analyze (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild (VS 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.nuget/packages
            ${{ github.workspace }}\packages
          key: nuget-v7-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-v7-

      - name: Restore packages
        shell: pwsh
        run: |
          nuget restore ${{ env.SOLUTION_PATH }}
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Debug /v:minimal
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Release /v:minimal

      - name: Diagnose warnings
        shell: pwsh
        run: |
          $output = msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Debug /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=false /m /v:normal 2>&1
          $warnErr = $output | Where-Object { $_ -match "warning CS|warning MSB|error CS|error MSB|Build FAILED" }
          if ($warnErr) { $warnErr | ForEach-Object { Write-Host $_ } }
          else { Write-Host "Clean — no warnings or errors" }

      - name: Build Debug (strict)
        shell: pwsh
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Debug /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true /p:NoWarn="CS1591" `
            /m /v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run unit tests (xunit.runner.console)
        shell: pwsh
        run: |
          # Locate xunit.console.exe from NuGet packages cache
          $xunitRunner = Get-ChildItem "$env:USERPROFILE\.nuget\packages\xunit.runner.console" `
            -Filter "xunit.console.exe" -Recurse -ErrorAction SilentlyContinue |
            Where-Object { $_.FullName -match "net472" } |
            Select-Object -First 1

          if (-not $xunitRunner) {
            # Try local packages folder
            $xunitRunner = Get-ChildItem "${{ github.workspace }}\packages\xunit.runner.console*" `
              -Filter "xunit.console.exe" -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "net472" } |
              Select-Object -First 1
          }

          if (-not $xunitRunner) {
            Write-Host "xunit.console.exe not found, searching all drives..."
            $xunitRunner = Get-ChildItem "C:\" -Filter "xunit.console.exe" `
              -Recurse -ErrorAction SilentlyContinue |
              Where-Object { $_.FullName -match "net472" } |
              Select-Object -First 1
          }

          Write-Host "xunit runner: $($xunitRunner.FullName)"

          $testDll = Get-ChildItem "CodeLensAI.Tests\bin\Debug" `
            -Filter "CodeLensAI.Tests.dll" -Recurse -ErrorAction SilentlyContinue |
            Select-Object -First 1

          if (-not $testDll) {
            Write-Host "Listing bin folder:"
            Get-ChildItem "CodeLensAI.Tests\bin" -Recurse -ErrorAction SilentlyContinue |
              ForEach-Object { Write-Host $_.FullName }
            Write-Error "Test DLL not found"
            exit 1
          }
          Write-Host "Test DLL: $($testDll.FullName)"

          & $xunitRunner.FullName $testDll.FullName -xml TestResults.xml -verbose
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Tests FAILED"
            exit $LASTEXITCODE
          }
          Write-Host "All tests passed"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "TestResults.xml"
          retention-days: 30

      - name: Build Release
        shell: pwsh
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Release /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true /p:NoWarn="CS1591" `
            /m /v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify VSIX artifact exists
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse
          if ($vsix.Count -eq 0) { Write-Error "No .vsix file found"; exit 1 }
          Write-Host "VSIX: $($vsix[0].Name) ($([math]::Round($vsix[0].Length/1KB,1)) KB)"

      - name: Run Roslyn analyzers
        shell: pwsh
        run: |
          msbuild ${{ env.PROJECT_PATH }} `
            /p:Configuration=Release /p:RunAnalyzersDuringBuild=true `
            /p:EnforceCodeStyleInBuild=true /p:TreatWarningsAsErrors=true `
            /p:NoWarn="CS1591" /t:Rebuild /m /v:normal `
            2>&1 | Tee-Object -FilePath analysis-report.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-report
          path: analysis-report.txt
          retention-days: 30

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeLensAI-vsix-${{ github.sha }}
          path: ${{ env.VSIX_OUTPUT_DIR }}/*.vsix
          retention-days: 90
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'
      - shell: pwsh
        run: |
          nuget restore ${{ env.SOLUTION_PATH }}
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Release /v:minimal
      - shell: pwsh
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Release /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true /p:NoWarn="CS1591" /m
      - id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse | Select-Object -First 1
          echo "VSIX_PATH=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodeLens AI ${{ github.ref_name }}"
          body: |
            Download and double-click `.vsix` to install.
            Requires Visual Studio 2022 (17.0+) and a local LLM server.
          files: ${{ steps.find_vsix.outputs.VSIX_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
