name: Build, Test, Analyze & Release CodeLens AI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_PATH: CodeLensAI.sln
  PROJECT_PATH: CodeLensAI/CodeLensAI.csproj
  TEST_PROJECT_PATH: CodeLensAI.Tests/CodeLensAI.Tests.csproj
  VSIX_OUTPUT_DIR: CodeLensAI/bin/Release
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # ────────────────────────────────────────────────────────────
  # Job 1 — Build + Test + Code Quality
  # ────────────────────────────────────────────────────────────
  build:
    name: Build, Test & Analyze (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild (VS 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles('**/*.csproj', '**/Directory.Build.props') }}
          restore-keys: nuget-

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_PATH }}

      # ── Debug build ──
      - name: Build (Debug)
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Debug `
            /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true `
            /m /v:minimal

      # ── Run unit tests ──
      - name: Run unit tests
        run: |
          $testDll = Get-ChildItem `
            -Path "CodeLensAI.Tests/bin/Debug" `
            -Filter "CodeLensAI.Tests.dll" -Recurse | Select-Object -First 1
          
          if (-not $testDll) {
            Write-Error "Test DLL not found"
            exit 1
          }

          $vstest = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\TestPlatform\vstest.console.exe" `
            $testDll.FullName `
            --logger:"trx;LogFileName=test-results.trx" `
            --logger:console `
            2>&1

          Write-Host $vstest
          
          if ($LASTEXITCODE -ne 0) {
            Write-Error "Unit tests FAILED"
            exit $LASTEXITCODE
          }
          Write-Host "✅ All unit tests passed"
        shell: pwsh

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: "**/*.trx"
          retention-days: 30

      # ── Release build for VSIX ──
      - name: Build (Release)
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Release `
            /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true `
            /m /v:minimal

      # ── Verify VSIX ──
      - name: Verify VSIX artifact exists
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse
          if ($vsix.Count -eq 0) {
            Write-Error "No .vsix file found"
            exit 1
          }
          Write-Host "✓ VSIX: $($vsix[0].Name) ($([math]::Round($vsix[0].Length/1KB,1)) KB)"

      # ── Roslyn code quality gate ──
      - name: Run Roslyn analyzers
        run: |
          msbuild ${{ env.PROJECT_PATH }} `
            /p:Configuration=Release `
            /p:RunAnalyzersDuringBuild=true `
            /p:EnforceCodeStyleInBuild=true `
            /p:TreatWarningsAsErrors=true `
            /t:Rebuild /m /v:normal `
            2>&1 | Tee-Object -FilePath analysis-report.txt

      - name: Upload analysis report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: code-quality-report
          path: analysis-report.txt
          retention-days: 30

      # ── Upload VSIX artifact ──
      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeLensAI-vsix-${{ github.sha }}
          path: ${{ env.VSIX_OUTPUT_DIR }}/*.vsix
          retention-days: 90
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────
  # Job 2 — GitHub Release (tags only)
  # ────────────────────────────────────────────────────────────
  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Restore NuGet packages
        run: nuget restore ${{ env.SOLUTION_PATH }}

      - name: Build Release VSIX
        run: |
          msbuild ${{ env.SOLUTION_PATH }} `
            /p:Configuration=Release `
            /p:DeployExtension=false `
            /p:TreatWarningsAsErrors=true `
            /m

      - name: Find VSIX file
        id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse | Select-Object -First 1
          echo "VSIX_PATH=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
          echo "VSIX_NAME=$($vsix.Name)" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release with VSIX
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodeLens AI ${{ github.ref_name }}"
          body: |
            ## CodeLens AI ${{ github.ref_name }}

            ### Installation
            1. Download `CodeLensAI.vsix` below
            2. Double-click to install (Visual Studio must be closed)
            3. Reopen VS 2022 → Tools → Options → **CodeLens AI** to configure your LLM endpoint

            ### Requirements
            - Visual Studio 2022 (version 17.0 or higher)
            - .NET Framework 4.7.2+
            - Local LLM server (Ollama, LM Studio, or any OpenAI-compatible API)
          files: ${{ steps.find_vsix.outputs.VSIX_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
