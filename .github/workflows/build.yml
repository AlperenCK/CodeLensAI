name: Build & Release CodeLens AI

on:
  push:
    branches: [ main ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_PATH: CodeLensAI.sln
  PROJECT_PATH: CodeLensAI/CodeLensAI.csproj
  VSIX_OUTPUT_DIR: CodeLensAI/bin/Release
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build VSIX (VS 2022)
    runs-on: windows-2022

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup MSBuild (VS 2022)
        uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Restore packages
        shell: pwsh
        run: |
          nuget restore -PackagesDirectory ".\packages\" ${{ env.SOLUTION_PATH }}
          Write-Host "packages folder contents:"
          Get-ChildItem ".\packages" -ErrorAction SilentlyContinue | Select-Object Name

      - name: Build Release VSIX (verbose)
        shell: pwsh
        run: |
          $output = msbuild ${{ env.PROJECT_PATH }} /p:Configuration=Release /v:normal 2>&1
          $output | ForEach-Object { Write-Host $_ }
          if ($LASTEXITCODE -ne 0) {
            Write-Host "=== ERRORS ==="
            $output | Where-Object { $_ -match "error |Error " } | ForEach-Object { Write-Host $_ }
            exit $LASTEXITCODE
          }

      - name: Verify VSIX
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse
          if ($vsix.Count -eq 0) { Write-Error "VSIX not found!"; exit 1 }
          Write-Host "VSIX: $($vsix[0].Name) ($([math]::Round($vsix[0].Length/1KB,1)) KB)"
          Add-Type -AssemblyName System.IO.Compression.FileSystem
          $zip = [System.IO.Compression.ZipFile]::OpenRead($vsix[0].FullName)
          $zip.Entries | ForEach-Object { Write-Host "  $($_.Name)" }
          $zip.Dispose()

      - name: Upload VSIX artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodeLensAI-vsix-${{ github.sha }}
          path: ${{ env.VSIX_OUTPUT_DIR }}/*.vsix
          retention-days: 90
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64
      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'
      - shell: pwsh
        run: nuget restore -PackagesDirectory ".\packages\" ${{ env.SOLUTION_PATH }}
      - shell: pwsh
        run: msbuild ${{ env.PROJECT_PATH }} /p:Configuration=Release /v:minimal
      - id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse | Select-Object -First 1
          echo "VSIX_PATH=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodeLens AI ${{ github.ref_name }}"
          body: |
            ## CodeLens AI ${{ github.ref_name }}
            1. `CodeLensAI.vsix` dosyasını indirin
            2. VS 2022'yi kapatın, çift tıklayın, yükleyin
            3. **Tools → Options → CodeLens AI** ile LLM'inizi yapılandırın
          files: ${{ steps.find_vsix.outputs.VSIX_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
