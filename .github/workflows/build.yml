name: Build, Test, Analyze & Release CodeLens AI

on:
  push:
    branches: [ main, develop ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  SOLUTION_PATH: CodeLensAI.sln
  PROJECT_PATH: CodeLensAI/CodeLensAI.csproj
  VSIX_OUTPUT_DIR: CodeLensAI/bin/Release
  DOTNET_NOLOGO: true

jobs:
  build:
    name: Build, Test & Analyze (VS 2022)
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
          msbuild-architecture: x64

      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'

      - name: Cache NuGet
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-v14-${{ hashFiles('**/*.csproj') }}
          restore-keys: nuget-v14-

      - name: Restore
        shell: pwsh
        run: |
          nuget restore ${{ env.SOLUTION_PATH }}
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Debug /v:minimal

      - name: Build Debug
        shell: pwsh
        run: |
          msbuild ${{ env.SOLUTION_PATH }} /p:Configuration=Debug /p:DeployExtension=false /m /v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Run tests (continue on error to read output)
        shell: pwsh
        continue-on-error: true
        id: tests
        run: |
          $testDll = Get-ChildItem "CodeLensAI.Tests" -Filter "CodeLensAI.Tests.dll" -Recurse |
            Where-Object { $_.FullName -notmatch "ref\\" } | Select-Object -First 1
          Write-Host "DLL: $($testDll.FullName)"
          dotnet vstest "$($testDll.FullName)" --logger:"trx;LogFileName=${{ github.workspace }}\TR.trx" --logger:"console;verbosity=detailed"
          echo "TEST_EXIT=$LASTEXITCODE" >> $env:GITHUB_OUTPUT

      - name: Print TRX results
        shell: pwsh
        if: always()
        run: |
          if (Test-Path "${{ github.workspace }}\TR.trx") {
            $trx = Get-Content "${{ github.workspace }}\TR.trx" -Raw
            Write-Host "=== TRX CONTENT ==="
            Write-Host $trx
          } else {
            Write-Host "No TRX file found"
            Get-ChildItem "${{ github.workspace }}" -Filter "*.trx" -Recurse | ForEach-Object { Write-Host $_.FullName }
          }

      - name: Fail if tests failed
        shell: pwsh
        if: steps.tests.outputs.TEST_EXIT != '0'
        run: |
          Write-Error "Tests failed with exit code ${{ steps.tests.outputs.TEST_EXIT }}"
          exit 1

      - name: Build Release
        shell: pwsh
        run: |
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Release /v:minimal
          msbuild ${{ env.SOLUTION_PATH }} /p:Configuration=Release /p:DeployExtension=false /m /v:minimal
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Verify VSIX
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse
          if ($vsix.Count -eq 0) { Write-Error "No .vsix"; exit 1 }
          Write-Host "VSIX: $($vsix[0].Name) ($([math]::Round($vsix[0].Length/1KB,1)) KB)"

      - name: Run Roslyn analyzers
        shell: pwsh
        run: |
          msbuild ${{ env.PROJECT_PATH }} /p:Configuration=Release /p:RunAnalyzersDuringBuild=true /p:EnforceCodeStyleInBuild=true /t:Rebuild /m /v:normal 2>&1 | Tee-Object analysis-report.txt
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ci-artifacts-${{ github.sha }}
          path: |
            *.trx
            analysis-report.txt
            ${{ env.VSIX_OUTPUT_DIR }}/*.vsix
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-2022
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: microsoft/setup-msbuild@v2
        with:
          vs-version: '[17.0,18.0)'
      - uses: NuGet/setup-nuget@v2
        with:
          nuget-version: '6.x'
      - shell: pwsh
        run: |
          nuget restore ${{ env.SOLUTION_PATH }}
          msbuild ${{ env.SOLUTION_PATH }} /t:Restore /p:Configuration=Release /v:minimal
          msbuild ${{ env.SOLUTION_PATH }} /p:Configuration=Release /p:DeployExtension=false /m
      - id: find_vsix
        shell: pwsh
        run: |
          $vsix = Get-ChildItem -Path "${{ env.VSIX_OUTPUT_DIR }}" -Filter "*.vsix" -Recurse | Select-Object -First 1
          echo "VSIX_PATH=$($vsix.FullName)" >> $env:GITHUB_OUTPUT
      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "CodeLens AI ${{ github.ref_name }}"
          body: Download `.vsix` below. Requires VS 2022 (17.0+) and a local LLM server.
          files: ${{ steps.find_vsix.outputs.VSIX_PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: true
